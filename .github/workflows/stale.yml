---
name: stale

on:
  schedule:
    # Run weekly on Saturdays
    - cron: "30 1 * * 6"
  # Run the workflow manually
  workflow_dispatch:

# Declare default permissions as read-only
permissions: read-all

jobs:
  mark-stale:
    # Call reusable workflow file
    uses: cisco-ospo/.github/.github/workflows/_stale.yml@c4668d5c4678f539295df629f7a48d4677808aa8
    permissions:
      contents: read
      issues: write
      pull-requests: write
    with:
      days-until-stale: 60
      days-until-close: 7
      stale-label: "stale"
      exempt-label: "keep"
