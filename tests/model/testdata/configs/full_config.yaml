---
model:
  path: "meta-llama/Llama-2-7b"
  name: "llama2-7b"
  tokenizer: "/path/to/tokenizer"
  reasoning:
    start_delimiter: "<think>"
    end_delimiter: "</think>"
  response_pattern: "Answer: (.*)"
  engine:
    engine_type: vllm
    num_gpus: 4
    context_length: 4096
    kwargs:
      max_num_batched_tokens: 8192
  generation:
    temperature: 0.7
    top_p: 0.95
    max_completion_tokens: 1024
    kwargs:
      repetition_penalty: 1.1
